name: Publish to GitHub Packages

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write

jobs:
  publish:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v7

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Add Exasol GitHub NuGet source
      run: dotnet nuget add source --username exa-ci-1 --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/EXASOL/index.json"

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test
      run: dotnet test --configuration Release --no-build --verbosity normal

    - name: Pack
      run: dotnet pack ./error-reporting-csharp-dotnet-tool/error-reporting-csharp-dotnet-tool.csproj --configuration Release --no-build --output ./artifacts/packages

    - name: Push to GitHub NuGet
      shell: pwsh
      run: |
        $packages = Get-ChildItem -Path ./artifacts/packages -Filter *.nupkg
        if (-not $packages) {
          throw "No NuGet packages found in ./artifacts/packages."
        }

        foreach ($package in $packages) {
          dotnet nuget push $package.FullName --source "github" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
        }

